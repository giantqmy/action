yolov11_tensorrt_node:
  ros__parameters:
    # Model paths
    onnx_path: "install/yolov11_tensorRT_ros2/share/yolov11_tensorRT_ros2/models/yolov11n.onnx"
    trt_path: "install/yolov11_tensorRT_ros2/share/yolov11_tensorRT_ros2/models/yolov11n.trt"

    # Input settings
    input_width: 640
    input_height: 640
    input_channel: 3
    batch_size: 1

    # Detection thresholds
    object_thresh: 0.5
    nms_thresh: 0.45
    class_num: 80

    # Topics
    image_topic: "/camera/image_raw"
    detection_topic: "/yolov11/detections"
    result_image_topic: "/yolov11/result_image"

    # Publish result image with bounding boxes drawn
    publish_result_image: true

    # COCO class names (80 classes)
    class_names: ["person", "bicycle", "car", "motorbike", "aeroplane", "bus", "train",
                  "truck", "boat", "traffic light", "fire hydrant", "stop sign",
                  "parking meter", "bench", "bird", "cat", "dog", "horse", "sheep",
                  "cow", "elephant", "bear", "zebra", "giraffe", "backpack", "umbrella",
                  "handbag", "tie", "suitcase", "frisbee", "skis", "snowboard",
                  "sports ball", "kite", "baseball bat", "baseball glove", "skateboard",
                  "surfboard", "tennis racket", "bottle", "wine glass", "cup", "fork",
                  "knife", "spoon", "bowl", "banana", "apple", "sandwich", "orange",
                  "broccoli", "carrot", "hot dog", "pizza", "donut", "cake", "chair",
                  "sofa", "pottedplant", "bed", "diningtable", "toilet", "tvmonitor",
                  "laptop", "mouse", "remote", "keyboard", "cell phone", "microwave",
                  "oven", "toaster", "sink", "refrigerator", "book", "clock", "vase",
                  "scissors", "teddy bear", "hair drier", "toothbrush"]
